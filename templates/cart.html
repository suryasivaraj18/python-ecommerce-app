<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Your Shopping Cart</h1>

    {% if cart %}
        {% for item in cart %}
        <div class="cart-item">
            <h3>{{ item.name }}</h3>
            <p>Price: ₹{{ item.price }}</p>
        </div>
        {% endfor %}

        <h2>Total: ₹{{ total }}</h2>

        <a href="/checkout">
            <button>Checkout</button>
        </a>
    {% else %}
        <p>Your cart is empty.</p>
    {% endif %}

    <br><br>
    <a href="/">Back to Products</a>
</body>
</html>
